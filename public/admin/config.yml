backend:
  name: git-gateway
  branch: main

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: "blog"
    label: "Blog Posts"
    folder: "src/content/blog"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string", required: true }
      - { label: "Publish Date", name: "date", widget: "datetime", required: true }
      - label: "Category"
        name: "category"
        widget: "select"
        required: true
        options:
          - "Workouts & Training"
          - "Nutrition"
          - "Mindset & Motivation"
          - "Boxing"
          - "Client Success Stories"
          - "General"
      - { label: "Featured Image", name: "featured_image", widget: "image", required: true }
      - label: "Carousel Images"
        name: "carousel_images"
        widget: "list"
        required: false
        fields:
          - { label: "Image", name: "image", widget: "image", required: true }
          - { label: "Caption (optional)", name: "caption", widget: "string", required: false }
      - { label: "Excerpt", name: "excerpt", widget: "text", required: true }
      - { label: "Body", name: "body", widget: "markdown", required: true }
      - { label: "Tags", name: "tags", widget: "list", required: false }
      - { label: "Author", name: "author", widget: "string", default: "Mikhail Petrov", required: true }
      - { label: "Draft", name: "draft", widget: "boolean", default: false }
